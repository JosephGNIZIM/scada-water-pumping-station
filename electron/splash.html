<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>SCADA Water Station</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Arial, sans-serif;
        color: #edf6ff;
        background:
          radial-gradient(circle at top left, rgba(0, 212, 255, 0.18), transparent 10rem),
          linear-gradient(180deg, #07101c 0%, #0a0e1a 100%);
      }
      .card {
        width: 320px;
        padding: 28px;
        border-radius: 24px;
        background: rgba(13, 20, 34, 0.92);
        border: 1px solid rgba(0, 212, 255, 0.16);
        box-shadow: 0 24px 50px rgba(0, 0, 0, 0.45);
        text-align: center;
      }
      .logo {
        width: 88px;
        height: 88px;
        margin: 0 auto 18px;
        display: block;
        filter: drop-shadow(0 0 16px rgba(0, 212, 255, 0.22));
      }
      h1 {
        margin: 0 0 8px;
        font-family: Orbitron, Arial, sans-serif;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        color: #8ca6bf;
      }
      .progress {
        margin-top: 24px;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .bar {
        width: 10%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #00d4ff, #00ff88);
        box-shadow: 0 0 16px rgba(0, 212, 255, 0.35);
        transition: width 0.25s ease;
      }
      .status {
        margin-top: 12px;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="./buildResources/icon.png" alt="SCADA Water Station" />
      <h1>SCADA Water Station</h1>
      <p>Initialisation de la salle de controle</p>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <p class="status" id="status">Preparation...</p>
    </div>
    <script>
      window.setSplashProgress = (progress, label) => {
        document.getElementById('bar').style.width = `${progress}%`;
        document.getElementById('status').textContent = label;
      };
    </script>
  </body>
  </html>
